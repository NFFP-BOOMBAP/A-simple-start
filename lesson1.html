<!DOCTYPE html>
<html>

<head>
    <title>我的第一课</title>
    <style>
        /* body */
        body {
            background-color: #0f0f1a;
            font-family: arial, sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #14f195;
            font-size: 36px;
            margin-bottom: 10px;
            /* 下方留出10像素*/
        }

        h2 {
            color: #9945FF;
            font-size: 28px;
            margin-top: 30px;
            /*上方留出30像素，与前面内容拉开距离*/
            margin-bottom: 15px;
        }

        p {
            color: #cccccc;
            font-size: 18px;
            line-height: 1.6;
            margin-top: 5px;
            margin-bottom: 15px
        }

        button {
            background-color: #14F195;
            color: black;
            /* 3像素粗、紫色、实线*/
            border: 3px solid #9945FF;
            /*内边距：上下12px，左右24px （内容与边框的距离）*/
            padding: 12px 24px;

            font-size: 16px;
            border-radius: 30px;
            /*圆角变大，变成胶囊形状*/
            cursor: pointer;

            /*外边距： 上方留20px空白，右侧留10px空白*/
            margin-top: 20px;
            margin-right: 10px;
        }

        button:hover {
            background-color: #00cc7a;
        }

        .card {
            background-color: #1a1a2e;
            /*比背景稍亮的深色*/
            padding: 20px;
            /*卡片内部四周留白20像素*/
            border-radius: 16px;
            /*圆角*/
            border: 1px solid #333;
            /*细细的灰色边框*/
            margin-top: 30px;
            /*卡片上方留30像素*/
        }

        .card h2 {
            margin-top: 0;
            /*去掉卡片内标题的上边框，让它紧贴顶部*/
        }

        .card p {
            margin-bottom: 0;
            /*去掉卡片内段落的下边距，让底部留白均匀*/
        }

        .intro-card {
            background-color: #9945FF;
            padding: 20px;
            width: fit-content;
            /*新增：宽度由内容决定*/
            ;
        }

        .button-group {
            display: flex;
            /*开启 flexbpx*/
            gap: 20px;
            /*按钮之间的间隙*/
            margin-top: 20px;
            justify-content: flex-start;
            /*默认，靠左*/
        }

        .flex-center {
            display: flex;
            justify-content: center;
            /*水平居中*/
            align-items: center;
            /*垂直居中*/
            height: 400px;
            /*必须给高度，垂直居中才生效*/
            margin-top: 40px;
            background-color: #0a0a15;
            border-radius: 20px;
        }

        .wallet-card {
            background-color: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
        }

        .wallet-card h2 {
            margin-top: 0;
            color: #14f195;
        }

        .wallet-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .ph-card {
            background-color: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="intro-card">
        <h1>欢迎来到 web3 世界</h1>
        <p>我叫 刘景杭 </p>
        <p>今天是 2026年4月14日 我开始学习编程了</p>
    </div>
    <div class="button-group">
        <button onclick="sayhello()">和未来的自己打个招呼吧</button>
        <button>这是第二个按钮</button>
    </div>
    <div class="card">
        <p>三年后成为Solana合约工程师</p>
    </div>
    <div class="flex-center">
        <div class="wallet-card">
            <h2>🔑 连接钱包 </h2>
            <p>钱包地址：<span id="walletDisplay">未连接</span></p>
            <p>请选择你的钱包</p>
            <div class="wallet-buttons">
                <button onclick="connectPhantom();updateWalletDisplay()">phantom</button>
                <button onclick="connectBackpack()">backpack</button>
                <button>solflare</button>
                <button>廖勇</button>
            </div>
        </div>
    </div>
    <div class="ph-card">
        <h2>它能改变你的颜色</h2>
        <p>请你摁下您的右指</p>
        <button onclick="changebg()">切换背景颜色</button>

        <script>
            function sayhello() { alert('你好，现在的你。我是来自未来的你:Solana 合约工程师'); }
            function connectPhantom() { alert('Phantom 钱包已连接 （模拟）'); }
            function connectBackpack() { alert('你已在质押bp的协议中'); }
            var isRed=false;//放在函数里面，记住当前是不是红色
            function changebg(){if(isRed){document.body.style.backgroundColor='#0f0f1a';//改回深色
            isRed=false;}else{document.body.style.backgroundColor='red';//改成红色
            isRed=true;}}
            function updateWalletDisplay(){let fakeAddress='0x1234...abcd';//模拟我的Solana地址//通过id找到span元素，修改它的文字内容
            document.getElementById('walletDisplay').innerText=fakeAddress;}
            
        </script>
</body>

</html>
