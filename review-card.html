<!DOCTYPE html>
<html>
<head>
    <title>Review Card</title>
    <style>
        body{background-color:white;}
        p{color:white;
        font-size:36px;


        
    }
    .card{
        background-color:blueviolet;
        width:400px;
        padding:40px;
        border-radius:16px;
        border: 2px solid purple;
        margin-bottom:40px

    }
    .jhl{width:80px;
        height:80px;
        background-color:white;
        border-radius:50%;
        margin-bottom:20px;
        display:block;
        margin:0 auto 20px;

    }
    .toolbar{ display:flex;
        justify-content:flex-start;
        /*space-between是两端对齐，中间平均分布，space-around是平均分布*/
        gap:15px;
        margin-top:20px;


    }

        </style>

    
</head>
<body>
    <div class="card">
        <div class="jhl"></div>
    <p>刘景杭</p>
    <p>我会成为 Solana合约工程师</p>
    </div>
    <div class="toolbar">
        <button>点赞</button>
        <button>评论</button>
        <button>转发</button>
        <button>分享</button>
        </div>

</body>
</html>
